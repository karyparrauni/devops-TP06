
version: "3.9"

services:
  backend:
    environment:
      APP_ENV: development
      FLASK_DEBUG: "1" # Activa el modo debug nativamente
    volumes:
      - ./backend/app.py:/app/app.py:ro
    # Cambiamos la forma de ejecutarlo para que respete el entrypoint.sh
    command: ["python3", "-m", "flask", "run", "--host=0.0.0.0", "--port=5000"]

  db:
    ports:
      - "5432:5432"
